name: Android Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        env:
          CI: "1"
        run: npx expo prebuild --platform android --no-install

      - name: Configure release signing
        shell: bash
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub Actions secret: $name" >&2
              exit 1
            fi
          done

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

          node .github/scripts/configure-android-release-signing.mjs

      - name: Build signed release APK and AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Verify release signature
        shell: bash
        run: |
          set -euo pipefail
          APK="android/app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK"

          cd android/app/build/outputs
          sha256sum apk/release/app-release.apk bundle/release/app-release.aab > SHA256SUMS

      - name: Upload signed release packages
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-mobile-android-release
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/SHA256SUMS
          if-no-files-found: error
          retention-days: 30

      - name: Remove keystore
        if: always()
        shell: bash
        run: rm -f -- "$ANDROID_KEYSTORE_PATH"
